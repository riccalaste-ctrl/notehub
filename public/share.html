<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appunto condiviso</title>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script type="module" src="/assets/share.js" defer></script>
  </head>
  <body class="share-page">
    <main class="share-shell">
      <a class="back-link" href="/">Torna all'archivio</a>

      <section id="share-card" class="share-card hidden">
        <div class="share-head">
          <div>
            <span id="share-subject" class="subject-badge"></span>
            <h1 id="share-title"></h1>
            <p id="share-description" class="share-description"></p>
          </div>
          <div class="share-actions">
            <button id="share-copy" class="ghost-btn" type="button">Copia link</button>
            <a id="share-download" class="primary-btn" href="#">Scarica</a>
          </div>
        </div>

        <div id="share-preview" class="share-preview"></div>

        <dl class="meta-list meta-list-inline">
          <div>
            <dt>File</dt>
            <dd id="share-name"></dd>
          </div>
          <div>
            <dt>Dimensione</dt>
            <dd id="share-size"></dd>
          </div>
          <div>
            <dt>Caricato</dt>
            <dd id="share-date"></dd>
          </div>
          <div>
            <dt>Download</dt>
            <dd id="share-download-count"></dd>
          </div>
        </dl>
      </section>

      <section id="share-error" class="share-error hidden">
        <h1>File non disponibile</h1>
        <p>Il link potrebbe essere stato rimosso oppure il file non esiste piu'.</p>
        <a class="primary-btn" href="/">Apri l'archivio</a>
      </section>
    </main>
  </body>
</html>
